<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auto Download with Fallback</title>
</head>
<body>
  <h1>Your download should start automatically</h1>
  <p>If it doesn't, click the button below:</p>
  <a id="downloadBtn" href="blockai.exe" download="blockai.exe">
    <button>Download File</button>
  </a>

  <script>
    window.onload = function() {
      const link = document.createElement('a');
      link.href = 'blockai.exe'; // path to your file
      link.download = 'blockai.exe';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };
  </script>
</body>
</html>
